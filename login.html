<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - English ASAP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0f1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e293b; padding: 2rem; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Acesse seu curso</h2>
        <input type="email" id="email" placeholder="Seu e-mail de compra">
        <input type="password" id="password" placeholder="Sua senha">
        <button onclick="login()">Entrar</button>
        <p id="msg"></p>
    </div>

    <script>
        const supabaseUrl = 'https://rnmpqknafnoipjszcwta.supabase.co';
        const supabaseKey = 'sb_publishable_zsGIwdGxiTkHNDQ7S1l_9w_uP5a5gy2';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                document.getElementById('msg').innerText = "Erro: " + error.message;
            } else {
                window.location.href = "Englishasapru.html"; // Nome do seu arquivo principal
            }
        }
    </script>
</body>
</html>
